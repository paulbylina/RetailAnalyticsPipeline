services:
  airflow:
    image: apache/airflow:2.10.3
    container_name: retail-airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/airflow/project
    command:
      bash -c "
      pip install -r /opt/airflow/project/requirements.txt &&
      airflow db init &&
      airflow users delete --username admin || true &&
      airflow users create
        --username=admin
        --password=admin123
        --firstname=Admin
        --lastname=User
        --role=Admin
        --email=admin@example.com &&
      airflow standalone
      "